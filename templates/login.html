<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blood Group Detection</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

</head>

<body>

<div class="container">

    <div class="card auth-card">

        <h2 id="form-title">Login</h2>

        <!-- LOGIN FORM -->
        <form id="loginForm" action="/login" method="post">

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" action="/signup" method="post" class="hidden">

            <input type="text" name="username" placeholder="Create Username" required>
            <input type="password" name="password" placeholder="Create Password" required>

            <button type="submit">Sign Up</button>

        </form>

        <!-- TOGGLE -->
        <p class="toggle-text">
            Don’t have an account? 
            <span onclick="toggleForm()">Sign Up</span>
        </p>

    </div>

</div>

<script>
function toggleForm() {
    const login = document.getElementById("loginForm");
    const signup = document.getElementById("signupForm");
    const title = document.getElementById("form-title");
    const toggleText = document.querySelector(".toggle-text");

    if (login.style.display === "none") {
        login.style.display = "block";
        signup.style.display = "none";
        title.innerText = "Login";
        toggleText.innerHTML = `Don’t have an account? <span onclick="toggleForm()">Sign Up</span>`;
    } else {
        login.style.display = "none";
        signup.style.display = "block";
        title.innerText = "Sign Up";
        toggleText.innerHTML = `Already have an account? <span onclick="toggleForm()">Login</span>`;
    }
}
</script>

</body>
</html>
